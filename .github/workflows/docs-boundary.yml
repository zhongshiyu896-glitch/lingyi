name: Docs Boundary Gate
# Required Check: Docs Boundary Gate / docs-boundary-check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-boundary-check:
    name: docs-boundary-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base SHA
        id: base
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            echo "base_sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_sha=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run docs boundary check
        env:
          BASE_SHA: ${{ steps.base.outputs.base_sha }}
        run: bash scripts/ci/docs_boundary_check.sh

      - name: Collect docs boundary metadata
        if: always()
        run: scripts/ci/write_ci_metadata.sh .ci-reports "Docs Boundary Gate"

      - name: Upload docs boundary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-boundary-report-${{ github.sha }}
          path: .ci-reports
